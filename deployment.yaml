apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopslab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devopslab
  template:
    metadata:
      labels:
        app: devopslab
    spec:
      containers:
      - name: app
        image: ghcr.io/irsy0304/devopslab:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: devopslab
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: devopslab
